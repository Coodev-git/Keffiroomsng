<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Portal - KeffiRooms</title>
    <link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="agent.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
</head>
<body>
    <header class="header">
        <div class="container flex-between">
            <div class="logo">
                <span class="logo-icon">K</span>
                <span class="logo-text">KeffiRooms</span>
            </div>
            <button class="btn-logout" onclick="logout()">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </header>

    <section class="agent-section">
        <div class="container">
            <h2>Agent Dashboard</h2>
            <div class="agent-content">
                <div class="card">
                    <h3>Post a New Listing</h3>
                    <form onsubmit="postListing(event)">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Price</label>
                            <input type="number" required>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Post Listing</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        requireAgent();
        function postListing(event) {
            event.preventDefault();
            alert('Listing posted successfully!');
        }
        function logout() {
            auth.logout();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
